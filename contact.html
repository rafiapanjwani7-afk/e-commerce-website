<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container-fluid">

    <a class="navbar-brand" href="index.html">Beauty Products</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">

      <ul class="navbar-nav ms-auto text-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="product.html">Products</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>

    </div>
  </div>
</nav>

<!-- CONTACT SECTION -->
<div class="container my-5 pt-5">

<h1 class="text-center mb-4">Contact Us</h1>

<div class="row">

  <!-- INFO -->
  <div class="col-md-6">
    <h3>Get in Touch</h3>
    <p>We'd love to hear from you!</p>

    <ul class="list-unstyled">
      <li><strong>Address:</strong> 123 Beauty Street</li>
      <li><strong>Phone:</strong> +92 123 456 7890</li>
      <li><strong>Email:</strong> info@beautyproducts.com</li>
    </ul>
  </div>

  <!-- FORM -->
  <div class="col-md-6">
    <form>

      <input id="name" class="form-control mb-3" placeholder="Name">
      <input id="email" class="form-control mb-3" placeholder="Email">
      <input id="subject" class="form-control mb-3" placeholder="Subject">
      <textarea id="message" class="form-control mb-3" rows="5" placeholder="Message"></textarea>

      <button type="button" class="btn btn-primary w-100" onclick="sendMessage()">
        Send Message
      </button>

    </form>
  </div>

</div>

</div>

<!-- FOOTER -->
<footer class="footer mt-5">
  <div class="container text-center">
    <p>© 2026 My Store | All Rights Reserved</p>
  </div>
</footer>

<!-- SCRIPTS -->
