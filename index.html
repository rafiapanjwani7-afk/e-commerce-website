<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-commerce website</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="container-fuild">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">beauty products</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto text-center mb-2 mb-lg-0 ">
            <li class="nav-item">
            <a class="nav-link " aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
            <a class="nav-link" href="#">Products</a>
            </li>
            <li class="nav-item">
            <a class="nav-link" href="#">Contact Us</a>
            </li>
      </ul>
      <form class="d-flex" role="search">
         <select onchange="productChange()" id="menuCard"
                class="form-select me-2"
                aria-label="Default select example"
              >
                <option selected>Select Product</option>
                
              </select>
              <select
              id="brandMenu"
                class="form-select me-2"
                aria-label="Default select example"
              >
                <option selected>Select Brand</option>
                
              </select>
        <button class="btn btn-outline-success btn-dark" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>
     </div>
     <div class="container">
          <div class="carousel-inner">
            <div class="carousel-item active" data-bs-interval="10000">
                <img src="https://img.freepik.com/premium-photo/skin-care-beauty-products-packaging-design_519183-3991.jpg"
                    class="d-block w-100" alt="...">
            </div>
         <div id="allProducts" class="row mt-2 row-cols-1 row-cols-md-3 g-4">
       
       
        
      </div>
     </div>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="app.js"></script>
</body>
</html>
